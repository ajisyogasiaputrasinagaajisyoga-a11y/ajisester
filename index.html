<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucin Kita 💖</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    color:white;
}

/* LOGIN PAGE */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.login-box{
    background:rgba(0,0,0,0.3);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    width:200px;
    text-align:center;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
    font-weight:bold;
}

/* CONTENT */
.content{
    display:none;
}

/* HEADER */
.header{
    text-align:center;
    padding:50px 20px;
}

.header h1{
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white; }
    to{ text-shadow:0 0 30px pink; }
}

/* GALLERY */
.gallery{
    width:90%;
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.2);
    padding:15px;
    border-radius:20px;
    text-align:center;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
}

/* LOVE FALL */
.love{
    position:fixed;
    top:-10px;
    color:white;
    font-size:20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

.footer{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">

    <div class="login-box">
        <h2>💖 Masukkan Password 💖</h2>
        <p>khusus kamu aja</p>

        <input type="password" id="pass" placeholder="password...">
        <br>
        <button onclick="checkPass()">Masuk</button>
    </div>

</div>

<!-- CONTENT -->
<div class="content" id="content">

    <div class="header">
        <h1>💖 BUCIN KITA 💖</h1>
        <p>Ini kenangan kita selamanya 💕</p>
    </div>

    <div class="gallery">

        <div class="card">
            <img src="foto1.jpeg">
            <p>Foto 1 💕</p>
        </div>

        <div class="card">
            <img src="foto2.jpeg">
            <p>Foto 2 💕</p>
        </div>

        <div class="card">
            <img src="foto3.jpeg">
            <p>Foto 3 💕</p>
        </div>

        <div class="card">
            <img src="foto4.jpeg">
            <p>Foto 4 💕</p>
        </div>

    </div>

    <div class="footer">
        💖 Dibuat dengan cinta 💖
    </div>

</div>

<script>

/* PASSWORD */
function checkPass(){

    let pass = document.getElementById("pass").value;

    if(pass === "kamuaku"){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("content").style.display = "block";
    }else{
        alert("Password salah 😢");
    }
}

/* LOVE FALL ANIMATION */
function createLove(){

    const love = document.createElement("div");
    love.classList.add("love");
    love.innerHTML = "💖";

    love.style.left = Math.random() * 100 + "vw";
    love.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(love);

    setTimeout(() => {
        love.remove();
    }, 5000);
}

setInterval(createLove,300);

</script>

</body>
</html>
